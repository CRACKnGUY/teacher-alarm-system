[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; TFT_eSPI user setup location
build_flags =
  -DUSER_SETUP_LOADED=1
  -DILI9341_DRIVER=1
  -DTFT_CS=15
  -DTFT_DC=2
  -DTFT_RST=4
  -DTFT_MOSI=23
  -DTFT_MISO=19
  -DTFT_SCLK=18
  -DTFT_BL=32
  -DTOUCH_CS=21
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=20000000

lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  miguelbalboa/MFRC522@^1.4.11
  bblanchon/ArduinoJson@^7.3.1
  links2004/WebSockets@^2.5.0
